<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Database</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <div class="header-left">
          <h1>Employee Management</h1>
        </div>

        <button id="add-employee-btn" class="primary-btn">
          <span class="btn-icon">+</span>
          <span>Add Employee</span>
        </button>
      </header>

      <main class="main-content">
        <aside class="employee-list-panel">
          <div class="panel-header">
            <h2>Employees list</h2>
          </div>
          <ul id="employee-list" class="employee-list">
            <!-- Rendered via JS -->
          </ul>
        </aside>

        <section class="employee-details-panel">
          <div id="employee-details" class="employee-details">
            <div class="empty-state">
              <p>Select an employee from the list to view their details</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Add Employee Modal -->
    <div id="add-employee-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Add New Employee</h2>
          <button id="close-modal-btn" class="close-icon">&times;</button>
        </div>
        <form id="add-employee-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="emp-first-name">First Name</label>
              <input
                type="text"
                id="emp-first-name"
                placeholder="E.g. Thomas"
                required
              />
            </div>
            <div class="form-group">
              <label for="emp-last-name">Last Name</label>
              <input
                type="text"
                id="emp-last-name"
                placeholder="E.g. Leannon"
                required
              />
            </div>
            <div class="form-group">
              <label for="emp-email">Email</label>
              <input
                type="email"
                id="emp-email"
                placeholder="thomas@email.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="emp-phone">Phone</label>
              <input
                type="text"
                id="emp-phone"
                placeholder="123456789"
                required
              />
            </div>
            <div class="form-group">
              <label for="emp-salary">Salary ($)</label>
              <input
                type="number"
                id="emp-salary"
                placeholder="5000"
                required
              />
            </div>
            <div class="form-group">
              <label for="emp-dob">Date of Birth</label>
              <input type="date" id="emp-dob" required />
            </div>
            <div class="form-group full-width">
              <label for="emp-image">Image URL</label>
              <input
                type="url"
                id="emp-image"
                value="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                required
              />
            </div>
          </div>
          <div class="form-actions">
            <button type="button" id="cancel-modal-btn" class="secondary-btn">
              Cancel
            </button>
            <button type="submit" class="primary-btn submit-btn">
              Save Employee
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
